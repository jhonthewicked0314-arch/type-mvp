<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type MVP</title>
    <link rel="stylesheet" href="style.css">
    <!-- This brings Supabase into our project for later -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">
        <nav id="main-nav">
            <h1 id="site-title">Type MVP</h1>
            <ul>
                <li><a href="#" id="nav-main-test">Main Test</a></li>
                <li><a href="#" id="nav-lessons">Lessons</a></li>
            </ul>
        </nav>



        <div id="main-test-section">
            <!-- Header & Live Stats -->
            <header>

                <div class="stats">
                    <p>Time: <span id="timer">30</span>s</p>
                    <p>WPM: <span id="wpm">0</span></p>
                    <button id="restart-btn">Restart</button>
                </div>
            </header>

            <!-- The Typing Area -->
            <div id="typing-area">
                <p id="words-display">the quick brown fox jumps over the lazy dog</p>
                <!-- A hidden input box to capture mobile/desktop keyboards easily -->
                <input type="text" id="hidden-input" autocomplete="off">

            </div>

            <!-- History Area (For Supabase later) -->
            <div id="history-section">
                <h3>Your History</h3>
                <p id="user-tag">User ID: Generating...</p>
                <ul id="history-list">
                    <li>No history yet. Take a test!</li>
                </ul>
            </div>
        </div>

        <!-- NEW: Lessons Section -->
        <section id="lessons-section" style="display: none;">
            <h2>Typing Lessons</h2>

            <!-- Lessons List / Menu -->
            <div id="lessons-menu-display">
                <ul id="lesson-list">
                    <!-- Lesson items will be injected here by JS -->
                </ul>
            </div>

            <!-- Specific Lesson Test Area -->
            <div id="lesson-test-area" style="display: none;">
                <h3 id="lesson-title"></h3>
                <p id="lesson-instructions"></p>
                <div class="lesson-stats"> <!-- NEW: Container for lesson stats -->
                    <p>Time: <span id="lesson-timer">60</span>s</p> <!-- NEW: Lesson Timer -->
                </div>
                <p id="lesson-words-display"></p>
                <input type="text" id="lesson-input" autocomplete="off">

                <div id="lesson-results" style="display: none;">
                    <h4>Lesson Results</h4>
                    <p>WPM: <span id="lesson-wpm">0</span></p>
                    <p>Accuracy: <span id="lesson-accuracy">0%</span></p>
                    <button id="lesson-restart-btn">Try Again</button>
                    <button id="back-to-lessons-menu-btn">Back to Lessons</button>
                </div>
            </div>
        </section>


    </div>




    <script src="script.js"></script>
    <script src="lessons.js"></script>
</body>

</html>
